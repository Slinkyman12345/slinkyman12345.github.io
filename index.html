document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Fdiv>\n                <div style=\"width:9px; height:9px; border-radius:50%; background:{{ shutdownColor }}; box-shadow:0 0 6px {{ shutdownColor }};\"><\u002Fdiv>\n                <div style=\"width:9px; height:9px; border-radius:50%; background:{{ shutdownColor }}; box-shadow:0 0 6px {{ shutdownColor }};\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ shutdown }}\" style=\"cursor:{{ shutdownCursor }}; opacity:{{ shutdownOpacity }}; width:78px; height:78px; border-radius:50%; background: radial-gradient(circle at 38% 32%, oklch(0.95 0.02 90), {{ shutdownColor }} 60%, oklch(0.2 0.02 60) 100%); box-shadow: 0 0 18px {{ shutdownColor }}, inset 0 -4px 8px oklch(0 0 0/0.35), inset 0 3px 4px oklch(1 0 0/0.4); border:4px solid oklch(0.25 0.01 60); display:flex; align-items:center; justify-content:center;\">\n              <div style=\"font-size:10px; font-weight:700; letter-spacing:0.5px; color:oklch(0.15 0.01 60); text-align:center;\">COUPER<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:9px; color:oklch(0.15 0.02 110); font-family:'IBM Plex Mono',monospace; text-align:center; line-height:1.3;\">{{ shutdownText }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- SALLE DU GÉNÉRATEUR -->\n  <sc-if value=\"{{ isGenerateurRoom }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background: linear-gradient(180deg, oklch(0.62 0.005 250), oklch(0.4 0.005 250)); border-radius:12px; padding:16px; box-shadow: 0 10px 30px oklch(0.1 0.01 60 / 0.5);\">\n      <div style=\"border-radius:6px; overflow:hidden; border:2px solid oklch(0.3 0.005 250); background:oklch(0.16 0.02 60);\">\n\n        <div style=\"background: oklch(0.4 0.09 250); color:oklch(0.97 0.01 85); display:flex; align-items:center; justify-content:center; gap:14px; padding:10px 0; font-weight:700; letter-spacing:3px; font-size:16px;\">\n          <div style=\"flex:1; heig sform:rotate(45deg);\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:4px;\">\n                <div style=\"font-size:16px; font-weight:600; letter-spacing:1px;\">{{ generatorStatusLabel }}<\u002Fdiv>\n                <div style=\"font-size:12px; color:oklch(0.65 0.03 60); font-family:'IBM Plex Mono',monospace;\">{{ generatorStatusText }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Leviers secteurs -->\n          <div style=\"display:flex; flex-direction:column; gap:0; background:oklch(0.22 0.015 60); border:1px solid oklch(0.38 0.02 60); border-radius:10px; overflow:hidden;\">\n            <div style=\"background:oklch(0.94 0.015 85); padding:8px 14px;\">\n              <div style=\"font-size:11px; font-weight:700; letter-spacing:1px; color:oklch(0.25 0.01 60);\">LEVIERS — ALIMENTATION DES SECTEURS<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px; padding:18px;\">\n              <sc-for list=\"{{ sectors }}\" as=\"sec\" hint-placeholder-count=\"8\">\n                <div style=\"display:flex; flex-direction:column; align-items:center; gap:8px; background:oklch(0.18 0.01 60); border:1px solid oklch(0.35 0.02 60); border-radius:8px; padding:12px 6px;\">\n                  <div style=\"font-size:11px; font-weight:600; letter-spacing:1px;\">SECTEUR {{ sec.index }}<\u002Fdiv>\n                  <div style=\"width:12px; height:12px; border-radius:50%; background:{{ sec.color }}; box-shadow:0 0 8px {{ sec.color }};\"><\u002Fdiv>\n                  <div onclick=\"{{ sec.toggle }}\" style=\"cursor:{{ sec.cursor }}; width:30px; height:54px; border-radius:15px; background: linear-gradient(180deg, oklch(0.1 0.01 60), oklch(0.18 0.01 60)); border:2px solid oklch(0.4 0.02 60); position:relative; opacity:{{ sec.opacity }}; box-shadow: inset 0 2px 4px oklch(0 0 0/0.6);\">\n                    <div style=\"position:absolute; left:2px; top:{{ sec.knobTop }}; width:22px; height:22px; border-radius:50%; background: radial-gradient(circle at 35% 30%, oklch(0.95 0.02 90), {{ sec.color }} 70%); box-shadow:0 1px 3px oklch(0 0 0/0.5); transition: top .25s ease;\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:9px; font-family:'IBM Plex Mono',monospace; color:oklch(0.6 0.03 60);\">{{ sec.stateLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nconst RED = 'oklch(0.58 0.19 25)';\nconst GREEN = 'oklch(0.68 0.17 145)';\nconst AMBER = 'oklch(0.78 0.15 85)';\nconst GREY = 'oklch(0.42 0.01 250)';\n\nclass Component extends DCLogic {\n  state = {\n    room: 'serveur',\n    serverCmdOn: false,\n    valveOpen: false,\n    currentSent: false,\n    generatorStarting: false,\n    generatorRunning: false,\n    sectors: new Array(8).fill(false),\n    jitter: 0,\n  };\n\n  componentDidMount() {\n    this._jitterInterval = setInterval(() => {\n      this.setState({ jitter: Math.random() });\n    }, 1400);\n  }\n\n  goServeur = () => this.setState({ room: 'serveur' });\n  goGenerateur = () => this.setState({ room: 'generateur' });\n\n  initServer = () => {\n    if (!this.state.serverCmdOn) this.setState({ serverCmdOn: true });\n  };\n\n  turnValve = () => {\n    if (this.state.serverCmdOn && !this.state.valveOpen) this.setState({ valveOpen: true });\n  };\n\n  sendCurrent = () => {\n    if (this.state.valveOpen && !this.state.currentSent) {\n      this.setState({ currentSent: true, generatorStarting: true });\n      this._timer = setTimeout(() => {\n        this.setState({ generatorStarting: false, generatorRunning: true });\n      }, 1800);\n    }\n  };\n\n  toggleSector = (i) => {\n    if (!this.state.generatorRunning) return;\n    this.setState((s) => {\n      const sectors = [...s.sectors];\n      sectors[i] = !sectors[i];\n      return { sectors };\n    });\n  };\n\n  shutdown = () => {\n    const allOn = this.state.sectors.every(Boolean);\n    if (!allOn) return;\n    clearTimeout(this._timer);\n    this.setState({\n      serverCmdOn: false,\n      valveOpen: false,\n      currentSent: false,\n      generatorStarting: false,\n      generatorRunning: false,\n      sectors: new Array(8).fill(false),\n    });\n  };\n\n  emergencyStop = () => {\n    clearTimeout(this._timer);\n    this.setState({\n      serverCmdOn: false,\n      valveOpen: false,\n      currentSent: false,\n      generatorStarting: false,\n      generatorRunning: false,\n      sectors: new Array(8).fill(false),\n    });\n  };\n\n  componentWillUnmount() {\n    clearTimeout(this._timer);\n    clearInterval(this._jitterInterval);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const allSectorsOn = s.sectors.every(Boolean);\n    const sectorsOnCount = s.sectors.filter(Boolean).length;\n\n    const step1Done = s.serverCmdOn;\n    const step2Done = s.valveOpen;\n    const step3Done = s.generatorRunning;\n    const step4Done = allSectorsOn;\n\n    const rawSteps = [\n      { n: 1, label: 'INIT. SALLE SERVEUR', done: step1Done, current: !step1Done },\n      { n: 2, label: 'OUVERTURE VANNE', done: step2Done, current: step1Done && !step2Done },\n      { n: 3, label: 'ENVOI DU COURANT', done: step3Done, current: step2Done && !step3Done },\n      { n: 4, label: 'SECTEURS ALIMENTÉS', done: step4Done, current: step3Done && !step4Done },\n    ];\n    const steps = rawSteps.map((st, i) => ({\n      n: st.n,\n      label: st.label,\n      isDone: st.done,\n      isCurrent: st.current,\n      isPending: !st.done && !st.current,\n      hasNext: i < rawSteps.length - 1,\n    }));\n\n    const sectors = s.sectors.map((on, i) => ({\n      index: i + 1,\n      color: on ? GREEN : (s.generatorRunning ? RED : GREY),\n      cursor: s.generatorRunning ? 'pointer' : 'not-allowed',\n      opacity: s.generatorRunning ? 1 : 0.45,\n      knobTop: on ? '32px' : '2px',\n      stateLabel: on ? 'ALIMENTÉ' : (s.generatorRunning ? 'COUPÉ' : 'VERROUILLÉ'),\n      toggle: () => this.toggleSector(i),\n    }));\n\n    let generatorStatusLabel = 'ARRÊTÉ';\n    let generatorStatusText = 'En attente du courant pour démarrer la séquence.';\n    if (s.generatorStarting) {\n      generatorStatusLabel = 'SÉQUENCE DE DÉMARRAGE…';\n      generatorStatusText = 'Montée en régime en cours.';\n    } else if (s.generatorRunning) {\n      generatorStatusLabel = 'EN MARCHE';\n      generatorStatusText = `${sectorsOnCount}/8 secteurs alimentés.`;\n    }\n\n    return {\n      isServeurRoom: s.room === 'serveur',\n      isGenerateurRoom: s.room === 'generateur',\n      goServeur: this.goServeur,\n      goGenerateur: this.goGenerateur,\n      emergencyStop: this.emergencyStop,\n      steps,\n      sectors,\n      sectorsSummary: `${sectorsOnCount} / 8 secteurs sous tension`,\n\n      flowRateDisplay: s.valveOpen ? (38.4 + (s.jitter - 0.5) * 2.4).toFixed(1).padStart(4, '0') : '00.0',\n      flowRateColor: s.valveOpen ? GREEN : GREY,\n      powerDisplay: s.generatorRunning ? Math.max(0, sectorsOnCount / 8 * 22.5 + (s.jitter - 0.5) * 1.6).toFixed(1) : '0.0',\n      powerColor: s.generatorRunning ? GREEN : GREY,\n\n      initServer: this.initServer,\n      serverCmdColor: s.serverCmdOn ? GREEN : AMBER,\n      serverCmdText: s.serverCmdOn ? 'DÉMARRAGE INITIALISÉ' : 'CLIQUER POUR INITIALISER',\n      serverCmdBtnLabel: s.serverCmdOn ? 'INITIALISÉ' : 'DÉMARRER',\n\n      trappeColor: s.serverCmdOn ? GREEN : RED,\n      trappeText: s.serverCmdOn ? 'DÉVERROUILLÉE' : 'VERROUILLÉE',\n\n      voyantValveColor: s.valveOpen ? GREEN : RED,\n      voyantValveText: s.valveOpen ? 'VANNE OUVERTE — EAU EN CIRCULATION' : 'EN ATTENTE D\\u2019OUVERTURE',\n\n      sortieColor: s.generatorRunning ? GREEN : RED,\n      sortieText: s.generatorRunning ? 'SOUS TENSION — SORTIE ACTIVE' : 'EN ATTENTE',\n\n      generatorLampColor: s.generatorRunning ? GREEN : (s.generatorStarting ? AMBER : RED),\n      overallColor: allSectorsOn ? GREEN : (s.serverCmdOn ? AMBER : RED),\n      overallText: allSectorsOn ? 'SÉQUENCE COMPLÈTE' : (s.serverCmdOn ? 'SÉQUENCE EN COURS' : 'EN VEILLE'),\n\n      shutdown: this.shutdown,\n      shutdownColor: allSectorsOn ? RED : GREY,\n      shutdownBorder: allSectorsOn ? 'oklch(0.58 0.19 25)' : 'oklch(0.4 0.02 60)',\n      shutdownOpacity: allSectorsOn ? 1 : 0.45,\n      shutdownCursor: allSectorsOn ? 'pointer' : 'not-allowed',\n      shutdownText: allSectorsOn ? 'DISPONIBLE — COUPER LE GÉNÉRATEUR' : 'VERROUILLÉ TANT QUE TOUS LES SECTEURS NE SONT PAS ALIMENTÉS',\n\n      turnValve: this.turnValve,\n      valveCursor: (s.serverCmdOn && !s.valveOpen) ? 'pointer' : 'not-allowed',\n      valveOpacity: s.serverCmdOn ? 1 : 0.4,\n      valveRingColor: s.valveOpen ? GREEN : (s.serverCmdOn ? AMBER : GREY),\n      valveRotateStyle: s.valveOpen ? 'rotate(60deg)' : 'rotate(0deg)',\n      valveText: s.serverCmdOn ? (s.valveOpen ? 'Vanne ouverte.' : 'Cliquer pour tourner la vanne.') : 'Verrouillée — initialiser la salle serveur.',\n\n      pipeBg: s.valveOpen ? 'oklch(0.3 0.05 230)' : 'oklch(0.22 0.01 60)',\n      pipeStripes: s.valveOpen ? 'repeating-linear-gradient(90deg, oklch(0.55 0.1 230) 0 24px, oklch(0.35 0.06 230) 24px 48px)' : 'none',\n      pipeAnim: s.valveOpen ? 'flowDash 1s linear infinite' : 'none',\n\n      sendCurrent: this.sendCurrent,\n      currentCursor: (s.valveOpen && !s.currentSent) ? 'pointer' : 'not-allowed',\n      currentOpacity: s.valveOpen ? 1 : 0.4,\n      currentBtnColor: s.currentSent ? GREEN : AMBER,\n      currentBtnLabel: s.currentSent ? 'ENVOYÉ' : 'ENVOYER',\n      currentText: s.valveOpen ? (s.currentSent ? 'Courant envoyé au système.' : 'Cliquer pour démarrer le générateur.') : 'Verrouillé — ouvrir la vanne d\\u2019eau.',\n      courantLampColor: !s.valveOpen ? GREY : (s.currentSent ? GREEN : AMBER),\n      valveLampColor: !s.serverCmdOn ? GREY : (s.valveOpen ? GREEN : AMBER),\n\n      turbineColor: s.generatorRunning ? GREEN : (s.generatorStarting ? AMBER : GREY),\n      turbineAnim: s.generatorStarting ? 'spinTurbine 0.6s linear infinite' : (s.generatorRunning ? 'spinTurbine 3s linear infinite' : 'none'),\n      generatorStatusLabel,\n      generatorStatusText,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
